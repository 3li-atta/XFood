name: xfood_pos
description: Offline-first Flutter POS application for food service.
publish_to: 'none'
version: 1.0.3+4

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Database
  drift: ^2.15.0
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.2
  path: ^1.8.3

  # State Management
  flutter_bloc: ^8.1.4
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.6.7
  injectable: ^2.3.2

  # Routing
  go_router: ^13.2.0

  # Security
  bcrypt: ^1.1.3

  # Local Storage
  shared_preferences: ^2.2.2

  # Utilities
  intl: ^0.20.2
  uuid: ^4.3.3

  # Cloud Backup & Restore
  google_sign_in: ^6.2.1
  googleapis: ^13.1.0
  http: ^1.2.1
  restart_app: ^1.2.1

  # PDF Generation and Printing
  pdf: ^3.10.8
  printing: ^5.11.1

  # Custom OTA Update System
  package_info_plus: ^8.0.0
  dio: ^5.5.0
  open_filex: ^4.5.0
  workmanager: ^0.9.0+3

  # LAN Sync Server (P2P / Local Network)
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  shelf_web_socket: ^2.0.1
  web_socket_channel: ^3.0.0
  network_info_plus: ^6.0.1
  nsd: ^5.0.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

  # Code Generation
  drift_dev: ^2.15.0
  build_runner: ^2.4.8
  injectable_generator: ^2.4.1

  # Testing
  bloc_test: ^9.1.5
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
